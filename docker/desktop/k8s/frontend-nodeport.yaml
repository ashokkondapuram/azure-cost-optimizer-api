# Optional: expose UI on localhost via Docker Desktop Kubernetes
apiVersion: v1
kind: Service
metadata:
  name: frontend-local
  namespace: costoptimize
  labels:
    app: frontend
    app.kubernetes.io/part-of: costoptimize-recommender
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      nodePort: 30030
