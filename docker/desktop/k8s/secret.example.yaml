# Copy to secret.yaml, fill values, then: kubectl apply -f secret.yaml
# Do not commit secret.yaml with real credentials.
apiVersion: v1
kind: Secret
metadata:
  name: costoptimize-secrets
  namespace: costoptimize
  labels:
    app.kubernetes.io/part-of: costoptimize-recommender
type: Opaque
stringData:
  POSTGRES_PASSWORD: change-me-local-only
  JWT_SECRET: dev-only-change-me-docker-local-32chars
  ADMIN_PASSWORD: admin
  VIEWER_PASSWORD: viewer
  # DATABASE_URL is assembled in deployments from POSTGRES_* values
