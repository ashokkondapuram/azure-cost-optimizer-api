# Microservices local development stack
# Usage: docker compose -f docker-compose.microservices.yml up gateway monolith compute-disk security-keyvault

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: costoptimizer
      POSTGRES_PASSWORD: costoptimizer
      POSTGRES_DB: costoptimizer
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U costoptimizer"]
      interval: 5s
      timeout: 5s
      retries: 10

  monolith:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://costoptimizer:costoptimizer@postgres:5432/costoptimizer
      PORT: "8000"
      HOST: "127.0.0.1"
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  platform-auth:
    build:
      context: .
      dockerfile: services/platform-auth/Dockerfile
    environment:
      DATABASE_URL: postgresql://costoptimizer:costoptimizer@postgres:5432/costoptimizer
      PORT: "8010"
    ports:
      - "127.0.0.1:8010:8010"
    depends_on:
      postgres:
        condition: service_healthy

  platform-cost:
    build:
      context: .
      dockerfile: services/platform-cost/Dockerfile
    environment:
      DATABASE_URL: postgresql://costoptimizer:costoptimizer@postgres:5432/costoptimizer
      PORT: "8011"
    ports:
      - "127.0.0.1:8011:8011"
    depends_on:
      postgres:
        condition: service_healthy

  platform-orchestrator:
    build:
      context: .
      dockerfile: services/platform-orchestrator/Dockerfile
    environment:
      DATABASE_URL: postgresql://costoptimizer:costoptimizer@postgres:5432/costoptimizer
      MONOLITH_URL: http://monolith:8000
      PORT: "8012"
    ports:
      - "127.0.0.1:8012:8012"
    depends_on:
      - monolith
      - postgres

  compute-disk:
    build:
      context: .
      dockerfile: services/resources/compute-disk/Dockerfile
    environment:
      DATABASE_URL: postgresql://costoptimizer:costoptimizer@postgres:5432/costoptimizer
      PORT: "8108"
    ports:
      - "127.0.0.1:8108:8108"
    depends_on:
      postgres:
        condition: service_healthy

  security-keyvault:
    build:
      context: .
      dockerfile: services/resources/security-keyvault/Dockerfile
    environment:
      DATABASE_URL: postgresql://costoptimizer:costoptimizer@postgres:5432/costoptimizer
      PORT: "8141"
    ports:
      - "127.0.0.1:8141:8141"
    depends_on:
      postgres:
        condition: service_healthy

  gateway:
    build:
      context: .
      dockerfile: services/platform-gateway/Dockerfile
    environment:
      MONOLITH_URL: http://monolith:8000
      AUTH_SERVICE_URL: http://platform-auth:8010
      COST_SERVICE_URL: http://platform-cost:8011
      ORCHESTRATOR_URL: http://platform-orchestrator:8012
      PORT: "8080"
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      - monolith
      - platform-auth
      - platform-cost
      - platform-orchestrator
      - compute-disk
      - security-keyvault

volumes:
  pgdata:
