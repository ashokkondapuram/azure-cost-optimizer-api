<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#e4f4fc" />
    <meta name="description" content="InfinityOps — internal Azure cost and operations" />
    <link rel="icon" type="image/svg+xml" href="%PUBLIC_URL%/infinityops-icon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <title>InfinityOps</title>
    <script>
      (function () {
        try {
          var raw = localStorage.getItem('finops-theme');
          if (raw == null) return;
          var theme = JSON.parse(raw);
          if (theme === 'dark' || theme === 'light') {
            document.documentElement.setAttribute('data-theme', theme);
            var meta = document.querySelector('meta[name="theme-color"]');
            if (meta) meta.setAttribute('content', theme === 'dark' ? '#121820' : '#e4f4fc');
          }
        } catch (e) { /* ignore */ }
      })();
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
