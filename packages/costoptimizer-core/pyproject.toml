[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "costoptimizer-core"
version = "0.1.0"
description = "Shared contracts and factories for CostOptimizeRecommender microservices"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "fastapi>=0.115",
  "httpx>=0.27",
  "pydantic>=2.0",
  "PyYAML>=6.0",
  "uvicorn>=0.30",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["costoptimizer_core*"]
